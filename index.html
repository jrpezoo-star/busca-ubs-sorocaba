<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de UBS - Sorocaba</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f7f9fc;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        #controls {
            margin-bottom: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
        }
        #endereco {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #004085;
        }
        #map {
            height: 500px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #resultado {
            margin-bottom: 20px;
            padding: 15px;
            background: #e9ecef;
            border-left: 5px solid #6c757d;
            border-radius: 4px;
            font-size: 16px;
        }
        .sucesso {
            border-left-color: #28a745 !important;
            background-color: #d4edda !important;
        }
        .erro {
            border-left-color: #dc3545 !important;
            background-color: #f8d7da !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Identificar UBS de Referência - Sorocaba</h2>
    
    <div id="controls">
        <input type="text" id="endereco" placeholder="Digite o endereço (Ex: Av. Afonso Vergueiro, 123)">
        <button onclick="buscarEndereco()">Buscar Região</button>
    </div>

    <div id="resultado">Digite um endereço acima para iniciar o cruzamento de dados.</div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCqikXLXL47_PQzz94BH05SIlSxkUx8bPg"></script>

<script>
    // 1. Inicializa o mapa do Leaflet centralizado em Sorocaba
    const map = L.map('map').setView([-23.5015, -47.4521], 13);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let geojsonData = null;
    let marker = null;
    
    // Instancia o geocodificador do Google Maps
    const geocoder = new google.maps.Geocoder();

    // 2. Carrega o arquivo de polígonos (abrangencia_ubs.json)
    // Se estiver na mesma pasta do repositório do GitHub, a rota relativa funciona perfeitamente.
    const URL_JSON = 'abrangencia_ubs.json'; 

    fetch(URL_JSON)
        .then(response => {
            if (!response.ok) throw new Error('Erro ao carregar a base de dados das UBSs.');
            return response.json();
        })
        .then(data => {
            geojsonData = data;
            
            // Plota os polígonos transparentes no mapa para referência visual do usuário
            L.geoJSON(data, {
                style: function (feature) {
                    return { color: "#007bff", weight: 2, fillOpacity: 0.1 };
                },
                onEachFeature: function (feature, layer) {
                    const props = feature.properties;
                    const nomeUbs = props.UBS || props.ubs || 'Unidade';
                    layer.bindPopup(`<b>Unidade:</b> ${nomeUbs}`);
                }
            }).addTo(map);
            
            console.log('Polígonos de abrangência carregados com sucesso.');
        })
        .catch(error => {
            console.error(error);
            document.getElementById('resultado').innerHTML = '<p class="erro">Não foi possível carregar o arquivo de abrangência geoespacial.</p>';
        });

    // 3. Função executada ao clicar no botão
    function buscarEndereco() {
        const enderecoInput = document.getElementById('endereco').value.trim();
        
        if (!enderecoInput) {
            alert('Por favor, informe um endereço.');
            return;
        }

        if (!geojsonData) {
            alert('A base de dados de polígonos ainda está carregando. Tente novamente em um segundo.');
            return;
        }

        // Adiciona o sufixo da cidade para evitar que o Google busque homônimos em outras capitais
        const enderecoCompleto = `${enderecoInput}, Sorocaba, SP, Brasil`;

        // Chama o Geocoder do Google
        geocoder.geocode({ address: enderecoCompleto }, function(results, status) {
            if (status === 'OK' && results[0]) {
                const loc = results[0].geometry.location;
                const lat = loc.lat();
                const lng = loc.lng();

                // Atualiza o mapa Leaflet para o ponto encontrado
                map.setView([lat, lng], 16);
                if (marker) map.removeLayer(marker);
                
                marker = L.marker([lat, lng]).addTo(map)
                    .bindPopup(`<b>Localizado:</b><br>${results[0].formatted_address}`)
                    .openPopup();

                // CRÍTICO: O Google trabalha com [Latitude, Longitude], mas o Turf.js 
                // segue a convenção GeoJSON restrita: [Longitude, Latitude].
                const pontoBusca = turf.point([lng, lat]);
                let ubsEncontrada = null;

                // Varre os polígonos com o Turf.js buscando a intersecção
                turf.featureEach(geojsonData, function(currentFeature) {
                    if (turf.booleanPointInPolygon(pontoBusca, currentFeature)) {
                        ubsEncontrada = currentFeature.properties;
                    }
                });

                // 4. Exibe o resultado na interface mapeando as colunas padrão Datasus
                const containerResultado = document.getElementById('resultado');
                
                if (ubsEncontrada) {
                    containerResultado.className = "sucesso";
                    containerResultado.innerHTML = `
                        <h3 style="margin-top: 0; color: #155724;">✓ Região Mapeada com Sucesso</h3>
                        <p><strong>UBS de Referência:</strong> ${ubsEncontrada.UBS || ubsEncontrada.ubs || 'N/A'}</p>
                        <p><strong>Bairro:</strong> ${ubsEncontrada.bairro || ubsEncontrada.Bairro || 'N/A'}</p>
                        <p><strong>Regional:</strong> ${ubsEncontrada.regional || 'N/A'}</p>
                        <p><strong>Colegiado / Microrregião:</strong> ${ubsEncontrada.colegiado || ubsEncontrada.microrregiao || 'N/A'}</p>
                        <small style="color: #555;">Correspondente ao endereço: <i>${results[0].formatted_address}</i></small>
                    `;
                } else {
                    containerResultado.className = "erro";
                    containerResultado.innerHTML = `
                        <h3 style="margin-top: 0; color: #721c24;">⚠ Fora da Área de Abrangência</h3>
                        <p>O endereço foi encontrado pelo Google Maps, mas as coordenadas caíram fora dos polígonos mapeados no arquivo JSON.</p>
                        <small style="color: #555;">Endereço analisado: <i>${results[0].formatted_address}</i></small>
                    `;
                }

            } else {
                alert('O Google Maps não conseguiu encontrar este endereço. Motivo: ' + status);
            }
        });
    }
</script>

</body>
</html>
